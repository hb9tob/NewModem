[package]
name = "modem-gui"
version = "0.1.0"
edition = "2021"
description = "NBFM modem GUI — Tauri 2 receiver"

[[bin]]
name = "nbfm-modem-gui"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
modem-core = { path = "../../modem-core" }
tauri = { version = "2", features = ["protocol-asset"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
cpal = "0.15"
dirs = "5"
hound = { workspace = true }
