<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>NBFM Modem RX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <label>
      Carte son :
      <select id="device-select">
        <option>Chargement…</option>
      </select>
    </label>
    <button id="btn-start" disabled>Démarrer</button>
    <button id="btn-stop" disabled>Arrêter</button>
    <span id="save-dir-label" class="save-dir" title="Dossier de sauvegarde"></span>
    <span id="status" class="status">prêt</span>
  </header>
  <main>
    <section id="current-file" class="panel">
      <h2>Fichier courant</h2>
      <div id="current-info">Aucun fichier reçu</div>
      <div id="current-image-wrap"></div>
    </section>
    <section class="panel">
      <h2>Événements</h2>
      <ul id="event-log"></ul>
    </section>
  </main>
  <script type="module" src="main.js"></script>
</body>
</html>
