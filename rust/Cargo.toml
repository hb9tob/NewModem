[workspace]
members = ["modem-core", "modem-cli", "modem-framing", "modem-gui/src-tauri", "modem-io", "modem-pluto", "modem-sdr-dsp", "modem-sdrplay", "modem-worker", "newmodem-collector"]
resolver = "2"

[workspace.dependencies]
num-complex = "0.4"
thiserror = "2"
hound = "3.5"
clap = { version = "4", features = ["derive"] }
